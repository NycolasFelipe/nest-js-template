services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-js-template-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_DOCKER_HOST}
    ports:
      - '${PORT}:${PORT}'
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: nest-js-template-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
    driver: bridge
