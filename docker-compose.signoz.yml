services:
  init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ./deploy/signoz/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
    networks:
      - app-network

  zookeeper-1:
    image: signoz/zookeeper:3.7.1
    container_name: signoz-zookeeper-1
    user: root
    environment:
      ZOO_SERVER_ID: 1
      ALLOW_ANONYMOUS_LOGIN: 'yes'
      ZOO_AUTOPURGE_INTERVAL: 1
      ZOO_ENABLE_PROMETHEUS_METRICS: 'yes'
      ZOO_PROMETHEUS_METRICS_PORT_NUMBER: 9141
    volumes:
      - signoz-zookeeper-1:/bitnami/zookeeper
    healthcheck:
      test: ['CMD-SHELL', 'curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-clickhouse
    tty: true
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      zookeeper-1:
        condition: service_healthy
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: 1
    volumes:
      - ./deploy/signoz/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./deploy/signoz/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./deploy/signoz/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./deploy/signoz/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ./deploy/signoz/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - signoz-clickhouse:/var/lib/clickhouse/
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', '0.0.0.0:8123/ping']
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - app-network

  signoz:
    image: signoz/signoz:${SIGNOZ_VERSION}
    container_name: signoz
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: ${SIGNOZ_TOKENIZER_JWT_SECRET}
    ports:
      - '${SIGNOZ_PORT}:8080'
    volumes:
      - signoz-sqlite:/var/lib/signoz/
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'localhost:8080/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_TAG}
    container_name: signoz-otel-collector
    depends_on:
      clickhouse:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check && /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: 'false'
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: 'true'
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    ports:
      - '${OTEL_COLLECTOR_GRPC_PORT}:4317'
      - '${OTEL_COLLECTOR_HTTP_PORT}:4318'
    volumes:
      - ./deploy/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./deploy/signoz/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    networks:
      - app-network

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:${SIGNOZ_OTELCOL_TAG}
    container_name: signoz-telemetrystore-migrator
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: 'true'
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap && /signoz-otel-collector migrate sync up && /signoz-otel-collector migrate async up
    restart: on-failure
    networks:
      - app-network

volumes:
  signoz-clickhouse:
  signoz-sqlite:
  signoz-zookeeper-1:

networks:
  app-network:
    name: nest-js-template_app-network
    external: true
